<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Founder Profile | EntreVid</title>
  <meta name="description" content="Explore all videos from this founder on EntreVid."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>
  <main style="flex:1;max-width:1100px;margin:0 auto;padding:64px 24px;width:100%;">
    <!-- Profile Header -->
    <div id="profile-header" class="fade-up glass-card" style="border-radius:20px;padding:40px;margin-bottom:48px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;">
      <div id="founder-avatar" style="width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:2rem;font-weight:800;color:#fff;flex-shrink:0;"></div>
      <div style="flex:1;">
        <h1 id="founder-name" style="font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:8px;"></h1>
        <div id="founder-meta" style="display:flex;gap:16px;flex-wrap:wrap;color:#8a91a8;font-size:14px;"></div>
      </div>
    </div>
    <!-- Videos -->
    <div>
      <h2 style="font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:24px;">Videos by this founder</h2>
      <div id="loading-state" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
        <div class="skeleton" style="border-radius:14px;height:220px;"></div>
        <div class="skeleton" style="border-radius:14px;height:220px;"></div>
        <div class="skeleton" style="border-radius:14px;height:220px;"></div>
      </div>
      <div id="video-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;"></div>
      <div id="empty-state" class="hidden" style="text-align:center;padding:60px;"><p style="color:#8a91a8;">No videos found for this founder.</p></div>
    </div>
  </main>
  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script>
    (async()=>{
      await window.initAppContext();
      window.renderNav(window.App.currentUser,'founders');
      window.renderFooter();
      window.initScrollReveal();

      const name = decodeURIComponent(new URLSearchParams(location.search).get('name')||'');
      document.title = name ? `${name} | EntreVid` : 'Founder Profile | EntreVid';

      const avatarEl = document.getElementById('founder-avatar');
      const nameEl = document.getElementById('founder-name');
      const metaEl = document.getElementById('founder-meta');
      const loadEl = document.getElementById('loading-state');
      const gridEl = document.getElementById('video-grid');
      const emptyEl = document.getElementById('empty-state');

      if(nameEl) nameEl.textContent = name || 'Unknown Founder';
      if(avatarEl) avatarEl.textContent = name ? name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';

      try {
        const data = await window.getJson('/api/videos');
        const videos = (data.videos||[]).filter(v=>(v.entrepreneur||'').trim()===name.trim());
        const cats = [...new Set(videos.map(v=>v.category).filter(Boolean))];
        if(loadEl) loadEl.style.display='none';
        if(metaEl) metaEl.innerHTML = `<span>📹 ${videos.length} video${videos.length!==1?'s':''}</span>${cats.map(c=>`<span style="padding:2px 10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:999px;color:#818cf8;">${window.escapeHtml(c)}</span>`).join('')}`;
        if(gridEl && videos.length) {
          gridEl.innerHTML = videos.map(v=>{
            const ytId=window.extractYouTubeId(v.youtubeUrl||v.youtubeId||v.id);
            const thumb=ytId?`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`:'';
            const videoId=window.escapeHtml(v._id||v.id||'');
            return `<a href="/video-details.html?id=${videoId}" style="display:block;text-decoration:none;background:#141826;border:1px solid #262b3d;border-radius:14px;overflow:hidden;transition:transform 0.25s,border-color 0.25s;" onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(99,102,241,0.3)'" onmouseout="this.style.transform='';this.style.borderColor='#262b3d'">
              <div style="aspect-ratio:16/9;background:#0b0d17;">${thumb?`<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;" loading="lazy"/>`:'<div style="width:100%;height:100%;"></div>'}</div>
              <div style="padding:14px;"><span style="display:inline-block;padding:2px 8px;background:rgba(99,102,241,0.1);border-radius:6px;font-size:11px;color:#818cf8;margin-bottom:8px;">${window.escapeHtml(v.category||'')}</span><h3 style="font-family:\'Sora\',sans-serif;font-size:14px;font-weight:600;color:#e6e8ef;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${window.escapeHtml(v.title||'')}</h3></div>
            </a>`;
          }).join('');
        } else { emptyEl?.classList.remove('hidden'); }
      } catch(err) { if(loadEl) loadEl.style.display='none'; window.showFlash('error','Failed to load founder videos.'); }
    })();
  </script>
</body>
</html>
