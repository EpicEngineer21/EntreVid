<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | Entrepreneur Video Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/profile.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>
  <main class="flex-grow max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-8">
      <h1 class="font-display text-3xl font-bold text-white mb-2">My Profile</h1>
      <p class="text-gray-400">View your account details and update your public profile info.</p>
    </div>
    <div id="profile-errors" class="hidden mb-4"></div>
    <div class="bg-surface-900/80 border border-surface-700/80 rounded-3xl p-6 sm:p-8">
      <form id="profile-form" class="space-y-5">
        <div>
          <label for="fullName" class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
          <input id="fullName" name="fullName" type="text" class="w-full px-4 py-2.5 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all" maxlength="80" required />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input id="email" name="email" type="email" class="w-full px-4 py-2.5 bg-surface-900 border border-surface-700 rounded-xl text-gray-400 cursor-not-allowed" readonly />
        </div>
        <div>
          <label for="role" class="block text-sm font-medium text-gray-300 mb-2">Role</label>
          <input id="role" name="role" type="text" class="w-full px-4 py-2.5 bg-surface-900 border border-surface-700 rounded-xl text-gray-400 cursor-not-allowed" readonly />
        </div>
        <div>
          <label for="profileImageUrl" class="block text-sm font-medium text-gray-300 mb-2">Profile Image URL (optional)</label>
          <input id="profileImageUrl" name="profileImageUrl" type="url" placeholder="https://example.com/avatar.jpg" class="w-full px-4 py-2.5 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all" maxlength="300" />
        </div>
        <div class="pt-2 flex items-center justify-between gap-3 flex-wrap">
          <div id="profile-preview" class="text-sm text-gray-400"></div>
          <button id="save-profile-btn" type="submit" class="px-6 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-medium transition-all shadow-[0_0_15px_-3px_rgba(79,70,229,0.4)]">Save Changes</button>
        </div>
      </form>
    </div>
  </main>
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js?v=5"></script>
  <script src="/js/profile.js?v=1"></script>
</body>
</html>
