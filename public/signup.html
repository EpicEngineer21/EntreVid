<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Entrepreneur Video Directory</title>
  <meta name="description" content="Create your EntreVid account and join the community of entrepreneurs sharing their stories." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/style.css?v=2" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">

  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
    
    <!-- Background Glows -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
      <div class="absolute top-1/3 left-1/3 w-[500px] h-[500px] bg-brand-500/15 rounded-full blur-[120px]"></div>
      <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-indigo-500/10 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
      
      <div class="bg-surface-900/80 backdrop-blur-xl border border-surface-700 rounded-3xl p-8 sm:p-10 shadow-2xl">
        
        <!-- Header -->
        <div class="text-center mb-8">
          <a href="/" class="inline-flex items-center gap-2 mb-6 group">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
          </a>
          <h1 class="font-display text-2xl sm:text-3xl font-bold text-white mb-2">Create your account</h1>
          <p class="text-gray-400 text-sm">Join the community and start sharing stories</p>
        </div>

        <!-- Errors -->
        <div id="error-box" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"></div>

        <!-- Form -->
        <form id="signup-form" class="space-y-5">
          <!-- Full Name -->
          <div>
            <label for="fullName" class="block text-sm font-medium text-gray-300 mb-1.5">Full Name</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <input type="text" id="fullName" name="fullName" required
                class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm"
                placeholder="John Doe" />
            </div>
          </div>
          
          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <input type="email" id="email" name="email" required
                class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm"
                placeholder="you@example.com" />
            </div>
          </div>

          <!-- Password -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input type="password" id="password" name="password" required minlength="8"
                class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm"
                placeholder="Min. 8 chars, upper, lower, number" />
            </div>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </div>
              <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8"
                class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm"
                placeholder="Re-enter your password" />
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="submit-btn"
            class="w-full py-3 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition-all shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 hover:-translate-y-0.5 text-sm mt-2 flex items-center justify-center gap-2">
            Create Account
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-grow border-t border-surface-700"></div>
          <span class="px-4 text-xs text-gray-500 font-medium">Already registered?</span>
          <div class="flex-grow border-t border-surface-700"></div>
        </div>

        <!-- Login Link -->
        <a href="/login" class="w-full block text-center py-3 rounded-xl bg-surface-800 hover:bg-surface-700 text-white font-medium border border-surface-700 transition-all text-sm hover:-translate-y-0.5">
          Log In Instead
        </a>
      </div>

    </div>
  </main>

  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>

  <script src="/js/common.js?v=2"></script>
  <script src="/js/signup.js?v=2"></script>
</body>
</html>
