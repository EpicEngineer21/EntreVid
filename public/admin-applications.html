<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Applications | EntreVid</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/admin-applications.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 relative z-10">
    <div class="mb-10 flex flex-col sm:flex-row sm:items-start justify-between gap-4">
      <div>
        <div class="flex items-center gap-3 mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
          <h1 class="font-display text-2xl sm:text-3xl font-bold text-white">Entrepreneur Applications</h1>
        </div>
        <p class="text-gray-400">Review and manage verification requests</p>
      </div>
      
      <div class="flex items-center gap-3">
        <button id="tab-pending" class="px-4 py-1.5 rounded-full border border-amber-500 text-amber-500 bg-amber-500/10 text-sm font-medium transition-colors">0 pending</button>
        <button id="tab-approved" class="px-4 py-1.5 rounded-full border border-emerald-500/30 text-emerald-500 hover:bg-emerald-500/10 text-sm font-medium transition-colors">0 approved</button>
        <button id="tab-rejected" class="px-4 py-1.5 rounded-full border border-red-500/30 text-red-500 hover:bg-red-500/10 text-sm font-medium transition-colors">0 rejected</button>
      </div>
    </div>

    <div id="loading-state" class="p-12 text-center">
      <div class="w-10 h-10 mx-auto rounded-full border-2 border-brand-500/30 border-t-brand-500 animate-spin mb-4"></div>
      <p class="text-gray-400">Loading applications...</p>
    </div>

    <div id="empty-state" class="hidden p-16 text-center bg-surface-900/80 rounded-3xl border border-surface-700/80">
      <div class="w-16 h-16 rounded-2xl bg-surface-800 flex items-center justify-center mx-auto mb-4 border border-surface-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <h3 class="font-display text-xl font-bold text-white mb-1" id="empty-title">All caught up!</h3>
      <p class="text-gray-400">No applications to show here.</p>
    </div>

    <div id="apps-list" class="space-y-6 hidden"></div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>

  <script src="/js/common.js?v=4"></script>
  <script src="/js/admin-applications.js?v=6"></script>
</body>
</html>
