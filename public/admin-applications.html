<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Applications | EntreVid</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/css/style.css?v=3" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10 relative z-10">
    <div class="mb-10">
      <div class="flex items-center gap-3 mb-2">
        <div class="p-2 rounded-lg bg-red-500/10 text-red-400 border border-red-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h1 class="font-display text-2xl sm:text-3xl font-bold text-white">Admin Panel</h1>
      </div>
      <p class="text-gray-400">Review and manage entrepreneur applications.</p>
    </div>

    <div class="bg-surface-900/80 backdrop-blur-xl border border-surface-700/80 rounded-3xl shadow-xl overflow-hidden">
      <!-- Tabs -->
      <div class="flex border-b border-surface-700 overflow-x-auto hide-scrollbar pl-4">
        <button id="tab-pending" class="px-6 py-4 text-sm font-medium border-b-2 border-brand-500 text-white whitespace-nowrap transition-colors flex items-center gap-2">
          Pending
          <span id="pending-count" class="px-2 py-0.5 rounded-full bg-brand-500/20 text-brand-400 text-xs">0</span>
        </button>
        <button id="tab-reviewed" class="px-6 py-4 text-sm font-medium border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition-colors whitespace-nowrap">
          Reviewed History
        </button>
      </div>

      <div id="loading-state" class="p-12 text-center">
        <div class="w-10 h-10 mx-auto rounded-full border-2 border-brand-500/30 border-t-brand-500 animate-spin mb-4"></div>
        <p class="text-gray-400">Loading applications...</p>
      </div>

      <div id="empty-state" class="hidden p-16 text-center">
        <div class="w-16 h-16 rounded-2xl bg-surface-800 flex items-center justify-center mx-auto mb-4 border border-surface-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <h3 class="font-display text-xl font-bold text-white mb-1" id="empty-title">All caught up!</h3>
        <p class="text-gray-400">No applications to show here.</p>
      </div>

      <div id="apps-list" class="divide-y divide-surface-700/50 hidden"></div>
    </div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <!-- Reject Modal Template -->
  <div id="reject-modal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-surface-950/80 backdrop-blur-sm modal-bg"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="bg-surface-900 border border-surface-700 rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-[scaleIn_0.2s_ease-out]">
        <div class="p-6 border-b border-surface-800">
          <h3 class="text-lg font-bold text-white">Reject Application</h3>
        </div>
        <div class="p-6">
          <label class="block text-sm font-medium text-gray-300 mb-2">Reason (sent to user)</label>
          <textarea id="reject-reason" class="w-full px-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 border-red-500 transition-all text-sm resize-none h-24" placeholder="Briefly explain why this application was denied..."></textarea>
        </div>
        <div class="p-6 border-t border-surface-800 flex justify-end gap-3 bg-surface-950/30">
          <button id="cancel-reject" class="px-5 py-2 rounded-xl bg-surface-800 hover:bg-surface-700 text-white text-sm font-medium border border-surface-700 transition">Cancel</button>
          <button id="confirm-reject" class="px-5 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-white text-sm font-medium transition shadow-lg shadow-red-500/20">Confirm Reject</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js?v=3"></script>
  <script src="/js/admin-applications.js?v=3"></script>
</body>
</html>
