<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Log In | EntreVid</title>
  <meta name="description" content="Log in to your EntreVid account to manage your watchlist, submissions, and founder profile."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <link rel="stylesheet" href="/css/pages/login.css"/>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 64px);">
    <!-- Left brand panel -->
    <div style="position:relative;overflow:hidden;background:linear-gradient(135deg,#0b0d17 0%,#141826 100%);display:flex;flex-direction:column;justify-content:center;padding:64px;border-right:1px solid rgba(255,255,255,0.05);" class="auth-brand-panel">
      <div style="position:absolute;top:-80px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);pointer-events:none;border-radius:50%;"></div>
      <div style="position:absolute;bottom:-60px;right:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(168,85,247,0.12),transparent 70%);pointer-events:none;border-radius:50%;"></div>
      <div style="position:relative;">
        <a href="/" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:56px;">
          <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
          <span style="font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem;color:#fff;">EntreVid</span>
        </a>
        <h2 style="font-family:'Sora',sans-serif;font-size:2rem;font-weight:800;color:#fff;line-height:1.2;margin-bottom:16px;">Welcome back,<br/><span class="gradient-text">founder.</span></h2>
        <p style="color:#8a91a8;font-size:15px;line-height:1.8;margin-bottom:48px;">Your dashboard, watchlist, and founder tools are waiting.</p>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div style="display:flex;align-items:center;gap:12px;"><div style="width:36px;height:36px;border-radius:10px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;">🎯</div><span style="font-size:14px;color:#8a91a8;">Curated founder video library</span></div>
          <div style="display:flex;align-items:center;gap:12px;"><div style="width:36px;height:36px;border-radius:10px;background:rgba(168,85,247,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;">📹</div><span style="font-size:14px;color:#8a91a8;">Submit &amp; manage your story</span></div>
          <div style="display:flex;align-items:center;gap:12px;"><div style="width:36px;height:36px;border-radius:10px;background:rgba(16,185,129,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;">💾</div><span style="font-size:14px;color:#8a91a8;">Save videos to your watchlist</span></div>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div style="display:flex;align-items:center;justify-content:center;padding:48px 40px;">
      <div style="width:100%;max-width:420px;">
        <!-- Tab switcher -->
        <div style="display:flex;background:#141826;border:1px solid #262b3d;border-radius:12px;padding:4px;margin-bottom:32px;">
          <a href="/login" style="flex:1;text-align:center;padding:10px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#a855f7);color:#fff;font-weight:600;font-size:14px;text-decoration:none;">Log In</a>
          <a href="/signup" style="flex:1;text-align:center;padding:10px;border-radius:9px;color:#8a91a8;font-weight:500;font-size:14px;text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='#e6e8ef'" onmouseout="this.style.color='#8a91a8'">Sign Up</a>
        </div>

        <h1 style="font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:6px;">Log in to your account</h1>
        <p style="font-size:14px;color:#8a91a8;margin-bottom:28px;">Don't have an account? <a href="/signup" style="color:#818cf8;text-decoration:none;font-weight:500;">Sign up free</a></p>

        <!-- Error -->
        <div id="error-container" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:20px;display:flex;align-items:center;gap:8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-text"></span>
        </div>

        <!-- Google (placeholder) -->
        <button type="button" id="google-btn" style="width:100%;padding:12px;background:#141826;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;transition:border-color 0.2s;" onmouseover="this.style.borderColor='#6366f1'" onmouseout="this.style.borderColor='#262b3d'">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div style="flex:1;height:1px;background:#262b3d;"></div>
          <span style="font-size:12px;color:#8a91a8;">or with email</span>
          <div style="flex:1;height:1px;background:#262b3d;"></div>
        </div>

        <form id="login-form">
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:6px;">Email address</label>
            <input type="email" id="email" autocomplete="email" placeholder="you@example.com" required style="width:100%;padding:12px 14px;background:#141826;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
          </div>
          <div style="margin-bottom:6px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <label style="font-size:13px;font-weight:500;color:#8a91a8;">Password</label>
              <a href="/forgot-password" style="font-size:12px;color:#818cf8;text-decoration:none;">Forgot password?</a>
            </div>
            <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required style="width:100%;padding:12px 14px;background:#141826;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
          </div>
          <div style="margin-bottom:24px;"></div>
          <button type="submit" id="login-btn" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">Log In</button>
        </form>
      </div>
    </div>
  </main>

  <style>
    @media(max-width:768px){
      main{grid-template-columns:1fr!important;}
      .auth-brand-panel{display:none!important;}
    }
  </style>
  <script src="/js/common.js?v=6"></script>
  <script src="/js/login.js?v=3"></script>
</body>
</html>
