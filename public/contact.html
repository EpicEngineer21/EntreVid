<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Us | EntreVid</title>
  <meta name="description" content="Get in touch with the EntreVid team. We'd love to hear from you — questions, suggestions, or partnership enquiries."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;max-width:1100px;margin:0 auto;padding:64px 24px;width:100%;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;" class="contact-grid">

      <!-- Left info -->
      <div class="fade-up">
        <div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);margin-bottom:24px;">
          <span style="font-size:13px;font-weight:500;color:#a5b4fc;">Get in touch</span>
        </div>
        <h1 style="font-family:'Sora',sans-serif;font-size:2.5rem;font-weight:800;line-height:1.1;color:#fff;margin-bottom:16px;">We'd love to hear from you</h1>
        <p style="color:#8a91a8;font-size:16px;line-height:1.8;margin-bottom:40px;">Questions, suggestions, partnership ideas, or just want to say hello — drop us a message and we'll respond within 24 hours.</p>

        <div style="display:flex;flex-direction:column;gap:20px;">
          <div style="display:flex;align-items:center;gap:16px;padding:20px;background:#141826;border:1px solid #262b3d;border-radius:12px;">
            <div style="width:44px;height:44px;background:rgba(99,102,241,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <p style="font-size:12px;color:#8a91a8;margin-bottom:2px;">Email us</p>
              <p style="font-size:14px;font-weight:500;color:#e6e8ef;">hello@entrevid.com</p>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:16px;padding:20px;background:#141826;border:1px solid #262b3d;border-radius:12px;">
            <div style="width:44px;height:44px;background:rgba(168,85,247,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#c084fc" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div>
              <p style="font-size:12px;color:#8a91a8;margin-bottom:2px;">Response time</p>
              <p style="font-size:14px;font-weight:500;color:#e6e8ef;">Within 24 hours</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Right form -->
      <div class="fade-up fade-up-delay-1 glass-card" style="border-radius:20px;padding:40px;">
        <h2 style="font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:28px;">Send a message</h2>
        <div id="contact-error" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:20px;"></div>
        <div id="contact-success" class="hidden" style="padding:16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:10px;color:#34d399;font-size:14px;margin-bottom:20px;text-align:center;">
          <div style="font-size:32px;margin-bottom:8px;">✅</div>
          <strong>Message sent!</strong> We'll get back to you within 24 hours.
        </div>
        <form id="contact-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:6px;">Full Name *</label>
              <input type="text" id="contact-name" required placeholder="Jane Smith" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:6px;">Email *</label>
              <input type="email" id="contact-email" required placeholder="jane@example.com" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
            </div>
          </div>
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:6px;">Topic *</label>
            <select id="contact-topic" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;cursor:pointer;">
              <option value="">Select a topic…</option>
              <option>General Enquiry</option>
              <option>Submit a Video Suggestion</option>
              <option>Partnership / Collaboration</option>
              <option>Report an Issue</option>
              <option>Press / Media</option>
              <option>Other</option>
            </select>
          </div>
          <div style="margin-bottom:24px;">
            <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:6px;">Message *</label>
            <textarea id="contact-message" required rows="5" placeholder="Tell us what's on your mind…" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;resize:vertical;box-sizing:border-box;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"></textarea>
          </div>
          <button type="submit" id="contact-submit" style="width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>

  <style>
    @media(max-width:768px){.contact-grid{grid-template-columns:1fr!important;}}
  </style>
  <script src="/js/common.js?v=6"></script>
  <script src="/js/contact.js?v=1"></script>
</body>
</html>
