<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Entrepreneur Video Directory</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/css/style.css?v=2" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
      <div class="absolute top-1/4 right-1/3 w-[500px] h-[500px] bg-red-500/15 rounded-full blur-[140px] mix-blend-screen opacity-50"></div>
    </div>
    
    <div class="w-full max-w-md bg-surface-900/80 backdrop-blur-xl border border-surface-700/80 p-8 sm:p-12 rounded-3xl shadow-2xl relative z-10 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-red-500/10 text-red-400 mb-6 border border-red-500/20 shadow-[0_0_30px_-5px_rgba(239,68,68,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
      </div>
      
      <h1 class="font-display text-3xl font-bold text-white mb-3">Forgot Password</h1>
      <p class="text-gray-400 text-sm mb-8">Enter your email address and we'll send you a code to reset your password.</p>

      <div id="error-box" class="hidden text-left bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"></div>

      <form id="forgot-form" class="space-y-6">
        <div class="text-left">
          <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <input type="email" id="email" required class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all text-sm" placeholder="you@example.com" />
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-semibold transition-all shadow-[0_0_20px_-5px_rgba(239,68,68,0.4)] hover:-translate-y-0.5 text-sm">
          Send Reset Code
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-surface-800">
        <a href="/login" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">← Back to Login</a>
      </div>
    </div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
