<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Forgot Password | EntreVid</title>
  <meta name="description" content="Reset your EntreVid account password."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;">
    <!-- Background glow -->
    <div style="position:absolute;top:20%;right:30%;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.1),transparent 70%);pointer-events:none;border-radius:50%;"></div>

    <div style="width:100%;max-width:420px;background:#141826;border:1px solid #262b3d;border-radius:20px;padding:40px;text-align:center;position:relative;">
      <!-- Icon -->
      <div style="width:56px;height:56px;border-radius:16px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 style="font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:8px;">Forgot Password?</h1>
      <p style="font-size:14px;color:#8a91a8;margin-bottom:28px;line-height:1.6;">Enter your email and we'll send you a 6-digit reset code.</p>

      <!-- Error -->
      <div id="error-box" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:20px;text-align:left;"></div>
      <!-- Success -->
      <div id="success-box" class="hidden" style="padding:16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);border-radius:12px;color:#34d399;font-size:14px;margin-bottom:20px;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">📬</div>
        <p style="font-weight:600;margin-bottom:4px;">Check your inbox!</p>
        <p id="success-msg" style="font-size:13px;opacity:0.85;"></p>
      </div>

      <form id="forgot-form">
        <div style="margin-bottom:20px;text-align:left;">
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
        </div>
        <button type="submit" id="submit-btn" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;margin-bottom:20px;">Send Reset Code</button>
      </form>

      <a href="/login" style="font-size:13px;color:#8a91a8;text-decoration:none;display:inline-flex;align-items:center;gap:6px;" onmouseover="this.style.color='#e6e8ef'" onmouseout="this.style.color='#8a91a8'">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Login
      </a>
    </div>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script src="/js/forgot-password.js?v=2"></script>
</body>
</html>
