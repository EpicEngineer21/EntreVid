<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Video | EntreVid</title>
  <meta name="description" content="Watch entrepreneur stories and founder insights on EntreVid."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

    /* Layout */
    .vd-page{max-width:1200px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:1fr 360px;gap:32px;align-items:start;}
    @media(max-width:900px){.vd-page{grid-template-columns:1fr;}}

    /* Back link */
    .vd-back{display:inline-flex;align-items:center;gap:8px;color:#8a91a8;font-size:14px;text-decoration:none;padding:16px 24px;max-width:1200px;margin:0 auto;display:block;}
    .vd-back:hover{color:#e6e8ef;}
    .vd-back-inner{display:inline-flex;align-items:center;gap:8px;}

    /* Player */
    .vd-player-wrap{border-radius:14px;overflow:hidden;background:#000;aspect-ratio:16/9;position:relative;width:100%;}
    .vd-player-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

    /* Meta below player */
    .vd-category{display:inline-block;padding:4px 12px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.2);border-radius:999px;font-size:12px;font-weight:500;color:#818cf8;margin-top:20px;margin-bottom:12px;}
    .vd-title{font-family:'Sora',sans-serif;font-size:clamp(1.4rem,3vw,1.9rem);font-weight:800;color:#fff;line-height:1.25;margin-bottom:18px;}

    /* Stats + actions row */
    .vd-meta-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:14px 0;border-top:1px solid #1c2030;border-bottom:1px solid #1c2030;margin-bottom:20px;}
    .vd-stats{display:flex;align-items:center;gap:18px;color:#8a91a8;font-size:13px;}
    .vd-stats span{display:flex;align-items:center;gap:6px;}
    .vd-actions{display:flex;align-items:center;gap:8px;}
    .vd-action-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:#1c2030;border:1px solid #262b3d;border-radius:8px;color:#c4c9d8;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.2s,border-color 0.2s;white-space:nowrap;}
    .vd-action-btn:hover{background:#262b3d;color:#fff;}
    .vd-action-btn.liked{background:rgba(244,63,94,0.12);border-color:rgba(244,63,94,0.3);color:#f87171;}
    .vd-action-btn.saved{background:rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.3);color:#818cf8;}

    /* About card */
    .vd-card{background:#141826;border:1px solid #1c2030;border-radius:14px;padding:24px;margin-bottom:16px;}
    .vd-card h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:12px;}
    .vd-desc{font-size:14px;color:#c4c9d8;line-height:1.75;}
    .vd-hashtags{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
    .vd-hashtag{font-size:12px;color:#818cf8;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.15);border-radius:6px;padding:3px 10px;}

    /* Comments */
    .vd-comments-prompt{color:#8a91a8;font-size:13px;line-height:1.6;margin-bottom:16px;}
    .vd-signin-btn{display:inline-flex;align-items:center;padding:10px 20px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}

    /* ── RIGHT SIDEBAR ── */
    .vd-sidebar{position:sticky;top:80px;}

    /* Founder card */
    .vd-founder-card{background:#141826;border:1px solid #1c2030;border-radius:14px;padding:20px;margin-bottom:20px;}
    .vd-founder-label{font-size:11px;font-weight:700;color:#8a91a8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
    .vd-founder-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .vd-founder-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
    .vd-founder-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:#fff;}
    .vd-founder-company{font-size:13px;color:#8a91a8;margin-top:1px;}
    .vd-founder-bio{font-size:13px;color:#c4c9d8;line-height:1.65;margin-bottom:14px;}
    .vd-founder-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .vd-founder-tag{font-size:11px;color:#8a91a8;background:#1c2030;border:1px solid #262b3d;border-radius:6px;padding:3px 10px;}
    .vd-view-profile{display:block;width:100%;padding:10px;background:#1c2030;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:13px;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;transition:background 0.2s,border-color 0.2s;}
    .vd-view-profile:hover{background:#262b3d;border-color:#6366f1;color:#fff;}

    /* Related videos */
    .vd-related-label{font-size:11px;font-weight:700;color:#8a91a8;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
    .vd-related-card{display:block;text-decoration:none;border-radius:12px;overflow:hidden;background:#141826;border:1px solid #1c2030;margin-bottom:12px;transition:border-color 0.2s;}
    .vd-related-card:hover{border-color:#6366f1;}
    .vd-related-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .vd-related-thumb img{width:100%;height:100%;object-fit:cover;}
    .vd-related-duration{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.8);color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;}
    .vd-related-info{padding:12px;}
    .vd-related-cat{font-size:11px;color:#818cf8;font-weight:500;margin-bottom:4px;}
    .vd-related-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:#e6e8ef;line-height:1.35;margin-bottom:6px;}
    .vd-related-author{font-size:12px;color:#8a91a8;}
    .vd-related-stats{display:flex;align-items:center;gap:10px;font-size:11px;color:#8a91a8;margin-top:4px;}

    /* Loading spinner */
    .vd-spinner{width:36px;height:36px;border-radius:50%;border:2px solid rgba(99,102,241,0.15);border-top-color:#6366f1;animation:spin 0.8s linear infinite;margin:80px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Owner actions */
    .vd-owner-bar{display:flex;gap:10px;padding:12px 0;margin-bottom:4px;}
  </style>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.9);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <!-- Loading state -->
  <div id="loading-state" style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div class="vd-spinner"></div>
  </div>

  <!-- Main content (hidden until loaded) -->
  <div id="video-content" class="hidden" style="flex:1;">
    <!-- Back link -->
    <div style="max-width:1200px;margin:0 auto;padding:0 24px;">
      <a href="/browse" id="back-link" class="vd-back-inner" style="display:inline-flex;align-items:center;gap:8px;color:#8a91a8;font-size:14px;text-decoration:none;padding:14px 0;transition:color 0.2s;" onmouseover="this.style.color='#e6e8ef'" onmouseout="this.style.color='#8a91a8'">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to browse
      </a>
    </div>

    <div class="vd-page">
      <!-- ══ LEFT COLUMN ══════════════════════════════════════════ -->
      <div>
        <!-- Player -->
        <div class="vd-player-wrap" id="player-container">
          <iframe id="video-player" src="" title="Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <!-- Category + Title -->
        <div id="v-category-wrap">
          <span id="v-category" class="vd-category"></span>
        </div>
        <h1 id="v-title" class="vd-title"></h1>

        <!-- Stats + Actions row -->
        <div class="vd-meta-row">
          <div class="vd-stats">
            <span>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <span id="v-views">—</span> views
            </span>
            <span>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span id="v-date"></span>
            </span>
          </div>
          <div class="vd-actions">
            <button class="vd-action-btn" id="like-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <span id="like-count">—</span>
            </button>
            <button class="vd-action-btn" id="save-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              Save
            </button>
            <button class="vd-action-btn" id="share-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share
            </button>
          </div>
        </div>

        <!-- Owner actions (edit/delete) - only shown to owner/admin -->
        <div id="owner-actions" class="hidden vd-owner-bar">
          <a id="edit-link" href="#" style="padding:8px 16px;background:#1c2030;border:1px solid #262b3d;border-radius:8px;color:#8a91a8;font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </a>
          <button id="delete-btn" style="padding:8px 16px;background:rgba(244,63,94,0.08);border:1px solid rgba(244,63,94,0.2);border-radius:8px;color:#f87171;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Delete
          </button>
        </div>

        <!-- About this video -->
        <div class="vd-card">
          <h3>About this video</h3>
          <p id="v-desc" class="vd-desc"></p>
          <div id="v-tags" class="vd-hashtags"></div>
        </div>

        <!-- Comments -->
        <div class="vd-card">
          <h3>Comments</h3>
          <p class="vd-comments-prompt">Sign in to join the conversation. Like and save features sync to your dashboard.</p>
          <div id="comment-cta">
            <a href="/login" class="vd-signin-btn">Sign in to comment</a>
          </div>
        </div>
      </div>

      <!-- ══ RIGHT SIDEBAR ════════════════════════════════════════ -->
      <aside class="vd-sidebar">
        <!-- Founder Card -->
        <div class="vd-founder-card">
          <p class="vd-founder-label">Founder</p>
          <div class="vd-founder-row">
            <div class="vd-founder-avatar" id="founder-avatar" style="background:linear-gradient(135deg,#6366f1,#a855f7);"></div>
            <div>
              <p class="vd-founder-name" id="founder-name"></p>
              <p class="vd-founder-company" id="founder-company"></p>
            </div>
          </div>
          <p class="vd-founder-bio" id="founder-bio"></p>
          <div class="vd-founder-tags" id="founder-tags"></div>
          <a href="#" id="founder-profile-link" class="vd-view-profile">View profile</a>
        </div>

        <!-- Related Videos -->
        <p class="vd-related-label">Related Videos</p>
        <div id="related-loading" style="text-align:center;padding:20px;color:#8a91a8;font-size:13px;">Loading…</div>
        <div id="related-list"></div>
        <div id="related-empty" class="hidden" style="font-size:13px;color:#8a91a8;text-align:center;padding:16px;">No related videos found.</div>
      </aside>
    </div>
  </div>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script src="/js/video-details.js?v=5"></script>
</body>
</html>
