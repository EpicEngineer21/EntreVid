<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Details | Entrepreneur Video Directory</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/video-details.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow max-w-6xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 lg:py-12 relative z-10 hidden" id="video-content">
    
    <div class="mb-6 flex items-center justify-between gap-4">
      <a href="/#directory" class="inline-flex items-center gap-2 text-sm font-medium text-gray-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Directory
      </a>

      <!-- Options Menu -->
      <div id="video-options" class="relative hidden">
        <button id="options-btn" class="w-10 h-10 rounded-xl bg-surface-800 hover:bg-surface-700 text-gray-300 flex items-center justify-center transition-colors focus:ring-2 focus:ring-brand-500/50">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>
        </button>
        <div id="options-dropdown" class="absolute right-0 mt-2 w-48 rounded-xl bg-surface-800 border border-surface-700 shadow-xl py-1 hidden z-20">
          <a id="edit-link" href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-300 hover:text-white hover:bg-surface-700 w-full text-left transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            Edit Video
          </a>
          <button id="delete-btn" class="flex items-center gap-2 px-4 py-2 text-sm text-red-400 hover:text-red-300 hover:bg-red-500/10 w-full text-left transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Delete Video
          </button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 lg:gap-12">
      <!-- Left Col (Player) -->
      <div class="lg:col-span-2 space-y-6">
        <div class="rounded-2xl overflow-hidden bg-surface-950 border border-surface-800 shadow-2xl aspect-video w-full relative">
          <iframe id="video-player" class="absolute inset-0 w-full h-full" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <div>
          <div class="flex items-center gap-2 mb-3">
            <span id="v-category" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-brand-500/10 text-brand-400 border border-brand-500/20"></span>
            <span class="text-sm text-gray-500">•</span>
            <span id="v-date" class="text-sm font-medium text-gray-400"></span>
            <span id="v-featured" class="hidden inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20 uppercase tracking-wider ml-auto">Featured</span>
          </div>

          <h1 id="v-title" class="font-display text-2xl sm:text-3xl lg:text-4xl font-bold text-white mb-6 leading-tight"></h1>

          <!-- Founder Info Card -->
          <div class="bg-surface-900/50 backdrop-blur border border-surface-800 rounded-2xl p-5 mb-8 flex flex-col sm:flex-row gap-4 sm:items-center justify-between">
            <div class="flex items-center gap-4">
              <div id="v-avatar" class="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold text-lg sm:text-xl ring-4 ring-surface-950 shrink-0">
              </div>
              <div>
                <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-0.5">Featuring</p>
                <div class="flex items-center gap-2">
                  <h3 id="v-entrepreneur" class="font-display text-lg sm:text-xl font-bold text-white"></h3>
                  <span id="v-verified" class="hidden pt-0.5 text-emerald-400" title="Verified Entrepreneur">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
                  </span>
                </div>
              </div>
            </div>
            
            <a id="v-youtube-btn" href="#" target="_blank" rel="noopener noreferrer" class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-surface-800 hover:bg-surface-700 text-white text-sm font-medium border border-surface-700 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-brand-400" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
              Watch on YouTube
            </a>
          </div>

          <!-- Description -->
          <div class="prose prose-invert prose-brand max-w-none">
            <h3 class="text-xl font-bold text-white mb-3">About this video</h3>
            <p id="v-desc" class="text-gray-300 leading-relaxed whitespace-pre-wrap"></p>
          </div>
        </div>
      </div>

      <!-- Right Col (Sidebar) -->
      <div class="space-y-6">
        <!-- Details Card -->
        <div class="bg-surface-900/50 backdrop-blur-xl border border-surface-800 rounded-2xl p-6">
          <h3 class="font-display text-lg font-bold text-white mb-4 border-b border-surface-800 pb-3">Video Details</h3>
          
          <div class="space-y-4">
            <div>
              <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Tags</p>
              <div id="v-tags" class="flex flex-wrap gap-2 text-sm"></div>
            </div>
            
            <div class="pt-4 border-t border-surface-800">
              <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Submitted By</p>
              <p id="v-submitter" class="text-sm font-medium text-white flex items-center gap-1.5"></p>
            </div>
          </div>
        </div>

        <div class="bg-gradient-to-br from-brand-900/10 to-indigo-900/10 border border-brand-500/20 rounded-2xl p-6 text-center">
          <h4 class="font-display text-lg font-bold text-white mb-2">Have a story to share?</h4>
          <p class="text-sm text-gray-400 mb-4 line-clamp-3">The best lessons come from real experiences. Submit your own entrepreneurial journey or favorite lessons.</p>
          <a href="/submit" class="inline-block w-full px-4 py-2.5 rounded-xl bg-brand-600/90 hover:bg-brand-500 text-white font-medium transition-colors text-sm shadow-lg shadow-brand-500/20">
            Submit a Video
          </a>
        </div>
      </div>
    </div>
  </main>

  <div id="loading-state" class="flex-grow flex items-center justify-center">
    <div class="w-10 h-10 rounded-full border-2 border-brand-500/30 border-t-brand-500 animate-spin"></div>
  </div>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js?v=4"></script>
  <script src="/js/video-details.js?v=3"></script>
</body>
</html>
