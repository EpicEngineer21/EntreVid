<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Page Not Found | EntreVid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;text-align:center;position:relative;overflow:hidden;">
    <!-- Radial glow -->
    <div style="position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.12),transparent 70%);border-radius:50%;pointer-events:none;"></div>

    <div style="position:relative;max-width:520px;">
      <!-- Big 404 -->
      <div style="font-family:'Sora',sans-serif;font-size:clamp(5rem,18vw,8rem);font-weight:800;line-height:1;background:linear-gradient(135deg,#6366f1,#a855f7,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;letter-spacing:-4px;">404</div>

      <h1 style="font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:12px;">Page Not Found</h1>
      <p style="color:#8a91a8;font-size:15px;line-height:1.7;margin-bottom:36px;max-width:380px;margin-left:auto;margin-right:auto;">The page you're looking for might have been moved, removed, or never existed. Let's get you back on track.</p>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:12px;color:#fff;font-weight:600;font-size:14px;text-decoration:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Go Home
        </a>
        <a href="/browse" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#141826;border:1px solid #262b3d;border-radius:12px;color:#e6e8ef;font-weight:500;font-size:14px;text-decoration:none;">
          Browse Videos
        </a>
      </div>
    </div>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script>
    (async function() {
      await window.initAppContext();
      window.renderNav(window.App.currentUser);
      window.renderFooter();
    })();
  </script>
</body>
</html>
