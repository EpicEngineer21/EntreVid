<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | EntreVid</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/404.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow flex items-center justify-center p-4 py-20 relative z-10">
    <!-- Glow -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden flex items-center justify-center">
      <div class="w-[500px] h-[500px] bg-brand-500/10 rounded-full blur-[140px] mix-blend-screen"></div>
    </div>
    
    <div class="text-center relative z-10 max-w-lg mx-auto">
      <div class="font-display text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-indigo-400 mb-6 drop-shadow-2xl opacity-90 inline-block tracking-tighter mix-blend-lighten">404</div>
      <h1 class="font-display text-2xl sm:text-3xl font-bold text-white mb-4">Page Not Found</h1>
      <p class="text-gray-400 mb-10 max-w-sm mx-auto leading-relaxed">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      
      <a href="/" class="inline-flex items-center gap-2 px-8 py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-medium transition-all shadow-[0_0_20px_-5px_rgba(79,70,229,0.4)] hover:-translate-y-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        Back to Directory
      </a>
    </div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <!-- No specific page logic needed, just init general context so nav/footer render -->
  <script src="/js/common.js?v=6"></script>
  <script>
    (async function init404() {
      await window.initAppContext();
      window.renderNav(window.App.currentUser);
      window.renderFooter();
    })();
  </script>
</body>
</html>
