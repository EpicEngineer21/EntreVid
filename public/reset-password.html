<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Entrepreneur Video Directory</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/reset-password.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
      <div class="absolute top-1/4 right-1/3 w-[500px] h-[500px] bg-red-500/15 rounded-full blur-[140px] mix-blend-screen opacity-50"></div>
    </div>
    
    <div class="w-full max-w-lg bg-surface-900/80 backdrop-blur-xl border border-surface-700/80 p-8 sm:p-12 rounded-3xl shadow-2xl relative z-10 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-red-500/10 text-red-400 mb-6 border border-red-500/20 shadow-[0_0_30px_-5px_rgba(239,68,68,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      
      <h1 class="font-display text-3xl font-bold text-white mb-3">Set new password</h1>
      <p class="text-gray-400 text-sm mb-8">Enter the 6-digit code from your email and choose a strong new password.</p>

      <div id="error-box" class="hidden text-left bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"></div>

      <form id="reset-form" class="space-y-6 text-left">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Reset Code (6 digits)</label>
          <div class="flex justify-between gap-1 sm:gap-2" id="otp-inputs">
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
            <div class="w-1 sm:w-2 h-1 bg-surface-700 self-center rounded-full"></div>
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
            <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all font-mono" />
          </div>
        </div>

        <div>
          <label for="newPassword" class="block text-sm font-medium text-gray-300 mb-1.5">New Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" id="newPassword" required class="w-full pl-11 pr-12 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all text-sm" placeholder="Min. 8 chars, upper, lower, number" />
            <button type="button" id="toggle-pw" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-500 hover:text-gray-300">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <!-- Strength indicator -->
          <div class="mt-2.5 flex gap-1 h-1.5 w-full bg-surface-800 rounded-full overflow-hidden">
            <div id="strength-1" class="h-full w-1/4 bg-surface-700 transition-colors duration-300"></div>
            <div id="strength-2" class="h-full w-1/4 bg-surface-700 transition-colors duration-300"></div>
            <div id="strength-3" class="h-full w-1/4 bg-surface-700 transition-colors duration-300"></div>
            <div id="strength-4" class="h-full w-1/4 bg-surface-700 transition-colors duration-300"></div>
          </div>
          <p id="strength-text" class="text-xs text-gray-500 mt-1.5 h-4"></p>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-1.5">Confirm Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <input type="password" id="confirmPassword" required class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 focus:border-red-500 transition-all text-sm" placeholder="Re-enter your new password" />
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-semibold transition-all shadow-[0_0_20px_-5px_rgba(239,68,68,0.4)] hover:-translate-y-0.5 text-sm">
          Reset Password
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-surface-800">
        <a href="/login" class="text-sm font-medium text-gray-400 hover:text-white transition-colors">Cancel reset</a>
      </div>
    </div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js?v=4"></script>
  <script src="/js/reset-password.js?v=2"></script>
</body>
</html>
