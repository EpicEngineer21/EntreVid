<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password | EntreVid</title>
  <meta name="description" content="Set a new password for your EntreVid account."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <style>
    .otp-input {
      width: 46px; height: 54px; text-align: center; font-size: 1.3rem; font-weight: 700;
      background: #0b0d17; border: 1.5px solid #262b3d; border-radius: 11px; color: #e6e8ef;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'Sora', monospace;
    }
    .otp-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    @media(max-width: 400px){ .otp-input { width: 36px; height: 44px; font-size: 1rem; } }
  </style>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;">
    <div style="position:absolute;top:20%;right:30%;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.1),transparent 70%);pointer-events:none;border-radius:50%;"></div>

    <div style="width:100%;max-width:460px;background:#141826;border:1px solid #262b3d;border-radius:20px;padding:40px;position:relative;">
      <!-- Icon + heading -->
      <div style="text-align:center;margin-bottom:28px;">
        <div style="width:56px;height:56px;border-radius:16px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="#818cf8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <h1 style="font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:6px;">Set new password</h1>
        <p style="font-size:14px;color:#8a91a8;">Enter the 6-digit code from your email and choose a strong new password.</p>
      </div>

      <!-- Error -->
      <div id="error-box" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:20px;"></div>

      <form id="reset-form">
        <!-- OTP -->
        <div style="margin-bottom:22px;">
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:10px;">Reset Code (6 digits)</label>
          <div id="otp-inputs" style="display:flex;justify-content:center;align-items:center;gap:7px;">
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
            <div style="width:14px;height:2px;background:#262b3d;border-radius:2px;"></div>
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
            <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
          </div>
        </div>

        <!-- New password -->
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">New Password</label>
          <div style="position:relative;">
            <input type="password" id="newPassword" required placeholder="Min. 8 chars, upper, lower, number" style="width:100%;padding:12px 44px 12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
            <button type="button" id="toggle-pw" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#8a91a8;padding:4px;">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <!-- Strength bar -->
          <div style="display:flex;gap:4px;margin-top:8px;">
            <div id="strength-1" style="height:4px;flex:1;background:#1c2030;border-radius:2px;transition:background 0.3s;"></div>
            <div id="strength-2" style="height:4px;flex:1;background:#1c2030;border-radius:2px;transition:background 0.3s;"></div>
            <div id="strength-3" style="height:4px;flex:1;background:#1c2030;border-radius:2px;transition:background 0.3s;"></div>
            <div id="strength-4" style="height:4px;flex:1;background:#1c2030;border-radius:2px;transition:background 0.3s;"></div>
          </div>
          <p id="strength-text" style="font-size:12px;color:#8a91a8;margin-top:4px;min-height:16px;"></p>
        </div>

        <!-- Confirm password -->
        <div style="margin-bottom:24px;">
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="Re-enter your new password" style="width:100%;padding:12px 14px;background:#0b0d17;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;transition:border-color 0.2s;" onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#262b3d'"/>
        </div>

        <button type="submit" id="submit-btn" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;margin-bottom:20px;">Reset Password</button>
      </form>

      <div style="text-align:center;">
        <a href="/login" style="font-size:13px;color:#8a91a8;text-decoration:none;" onmouseover="this.style.color='#e6e8ef'" onmouseout="this.style.color='#8a91a8'">← Cancel, go back to Login</a>
      </div>
    </div>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=6"></script>
  <script src="/js/reset-password.js?v=2"></script>
</body>
</html>
