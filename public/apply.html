<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrepreneur Application | EntreVid</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages/apply.css" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow max-w-3xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-12 relative z-10">
    <div class="mb-10 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-500/10 text-brand-400 mb-6 border border-brand-500/20 shadow-[0_0_30px_-5px_rgba(99,102,241,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="font-display text-3xl font-bold text-white mb-3">Become a Verified Entrepreneur</h1>
      <p class="text-gray-400">Share your journey and knowledge with the community by posting videos.</p>
    </div>

    <!-- Status states container -->
    <div id="status-container" class="hidden"></div>

    <!-- Apply Form -->
    <form id="apply-form" class="hidden bg-surface-900/80 backdrop-blur-xl border border-surface-700/80 p-6 sm:p-10 rounded-3xl shadow-xl space-y-6">
      
      <div id="error-box" class="hidden text-left bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"></div>

      <div>
        <label for="startupName" class="block text-sm font-medium text-gray-300 mb-1.5">Startup / Business Name <span class="text-red-400">*</span></label>
        <input type="text" id="startupName" required class="w-full px-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm" placeholder="e.g. Acme Corp" />
      </div>

      <div>
        <label for="bio" class="block text-sm font-medium text-gray-300 mb-1.5">Short Bio <span class="text-red-400">*</span></label>
        <textarea id="bio" required rows="4" maxlength="500" class="w-full px-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm resize-none" placeholder="Tell us about yourself and your entrepreneurial journey (min 20 chars)"></textarea>
        <p class="text-xs text-gray-500 mt-1.5 text-right"><span id="bio-count">0</span> / 500</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label for="linkedinUrl" class="block text-sm font-medium text-gray-300 mb-1.5">LinkedIn Profile</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg fill="currentColor" viewBox="0 0 24 24" class="h-4.5 w-4.5 text-gray-500"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </div>
            <input type="url" id="linkedinUrl" class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm" placeholder="https://linkedin.com/in/..." />
          </div>
        </div>

        <div>
          <label for="websiteUrl" class="block text-sm font-medium text-gray-300 mb-1.5">Business Website</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </div>
            <input type="url" id="websiteUrl" class="w-full pl-11 pr-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm" placeholder="https://..." />
          </div>
        </div>
      </div>
      <p class="text-xs text-gray-500 italic">Please provide at least one link to help us verify your identity.</p>

      <div>
        <label for="notes" class="block text-sm font-medium text-gray-300 mb-1.5">Additional Notes (Optional)</label>
        <textarea id="notes" rows="2" class="w-full px-4 py-3 bg-surface-950/50 border border-surface-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all text-sm resize-none" placeholder="Anything else we should know?"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition-all shadow-[0_0_20px_-5px_rgba(79,70,229,0.4)] hover:-translate-y-0.5 text-sm mt-4">
        Submit Application
      </button>
    </form>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js?v=4"></script>
  <script src="/js/apply.js?v=3"></script>
</body>
</html>
