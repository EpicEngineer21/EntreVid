<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Become a Verified Entrepreneur | EntreVid</title>
  <meta name="description" content="Apply to become a verified entrepreneur on EntreVid and start sharing your journey."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <style>
    .ev-input {
      width:100%;padding:12px 14px;background:#0b0d17;border:1.5px solid #262b3d;
      border-radius:10px;color:#e6e8ef;font-size:14px;outline:none;box-sizing:border-box;
      transition:border-color 0.2s,box-shadow 0.2s;font-family:'Inter',sans-serif;
    }
    .ev-input:focus { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,0.12); }
    .ev-input::placeholder { color:#8a91a8; }
    textarea.ev-input { resize:vertical; min-height:100px; }
    select.ev-input { appearance:none;cursor:pointer; }
  </style>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;max-width:700px;margin:0 auto;padding:52px 24px;width:100%;box-sizing:border-box;">
    <!-- Header -->
    <div style="text-align:center;margin-bottom:40px;">
      <div style="width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(168,85,247,0.2));border:1px solid rgba(99,102,241,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px;">⚡</div>
      <h1 style="font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:8px;">Become a Verified Entrepreneur</h1>
      <p style="color:#8a91a8;font-size:15px;max-width:460px;margin:0 auto;line-height:1.7;">Share your journey, lessons, and knowledge with the EntreVid community. Fill out the form below and we'll review your application.</p>
    </div>

    <!-- Status container (shown instead of form when already applied) -->
    <div id="status-container" class="hidden"></div>

    <!-- Apply form -->
    <form id="apply-form" class="hidden" style="background:#141826;border:1px solid #262b3d;border-radius:18px;padding:32px;">
      <div id="error-box" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:24px;"></div>

      <!-- Benefits strip -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:28px;">
        <div style="background:#1c2030;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:20px;margin-bottom:4px;">🎯</div><p style="font-size:12px;color:#8a91a8;">Post Videos</p></div>
        <div style="background:#1c2030;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:20px;margin-bottom:4px;">✅</div><p style="font-size:12px;color:#8a91a8;">Verified Badge</p></div>
        <div style="background:#1c2030;border-radius:10px;padding:12px;text-align:center;"><div style="font-size:20px;margin-bottom:4px;">🌐</div><p style="font-size:12px;color:#8a91a8;">Profile Page</p></div>
      </div>

      <!-- Startup Name -->
      <div style="margin-bottom:18px;">
        <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Startup / Business Name <span style="color:#f43f5e;">*</span></label>
        <input type="text" id="startupName" required class="ev-input" placeholder="e.g. Acme Corp"/>
      </div>

      <!-- Bio -->
      <div style="margin-bottom:6px;">
        <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Short Bio <span style="color:#f43f5e;">*</span></label>
        <textarea id="bio" required maxlength="500" class="ev-input" placeholder="Tell us about yourself and your entrepreneurial journey (min 20 chars)"></textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:4px;"><span id="bio-count" style="font-size:12px;color:#8a91a8;">0</span><span style="font-size:12px;color:#8a91a8;"> / 500</span></div>
      </div>

      <!-- LinkedIn + Website -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px;">
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">LinkedIn Profile</label>
          <input type="url" id="linkedinUrl" class="ev-input" placeholder="https://linkedin.com/in/..."/>
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Business Website</label>
          <input type="url" id="websiteUrl" class="ev-input" placeholder="https://..."/>
        </div>
      </div>
      <p style="font-size:12px;color:#8a91a8;margin-bottom:18px;font-style:italic;">Provide at least one link to help us verify your identity.</p>

      <!-- Notes -->
      <div style="margin-bottom:26px;">
        <label style="display:block;font-size:13px;font-weight:500;color:#8a91a8;margin-bottom:7px;">Additional Notes <span style="color:#8a91a8;font-weight:400;">(optional)</span></label>
        <textarea id="notes" rows="2" class="ev-input" placeholder="Anything else we should know?"></textarea>
      </div>

      <button type="submit" id="submit-btn" style="width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:11px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 0 24px rgba(99,102,241,0.3);letter-spacing:0.01em;">
        Submit Application
      </button>
    </form>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script src="/js/apply.js?v=3"></script>
</body>
</html>
