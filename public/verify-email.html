<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Entrepreneur Video Directory</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="/css/style.css?v=2" />
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen flex flex-col antialiased">
  <nav id="main-nav" class="sticky top-0 z-50 backdrop-blur-xl bg-surface-950/80 border-b border-white/5"></nav>

  <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
      <div class="absolute top-1/4 left-1/3 w-[500px] h-[500px] bg-brand-500/15 rounded-full blur-[140px] mix-blend-screen opacity-50"></div>
    </div>
    
    <div class="w-full max-w-lg bg-surface-900/80 backdrop-blur-xl border border-surface-700/80 p-8 sm:p-12 rounded-3xl shadow-2xl relative z-10 text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-brand-500/10 text-brand-400 mb-6 border border-brand-500/20 shadow-[0_0_30px_-5px_rgba(99,102,241,0.3)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      
      <h1 class="font-display text-3xl font-bold text-white mb-3">Check your email</h1>
      <p class="text-gray-400 text-sm mb-8">We've sent a 6-digit verification code. Please enter it below to verify your account.</p>

      <div id="error-box" class="hidden text-left bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-6"></div>

      <form id="verify-form" class="space-y-8">
        <div class="flex justify-center gap-2 sm:gap-3" id="otp-inputs">
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
          <div class="w-2 h-1 bg-surface-700 self-center rounded-full"></div>
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
          <input type="text" maxlength="1" class="w-10 h-12 sm:w-12 sm:h-14 text-center text-xl font-bold bg-surface-950/50 border border-surface-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all font-mono" />
        </div>
        <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white font-semibold transition-all shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 hover:-translate-y-0.5 text-sm">
          Verify Email
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-surface-800 space-y-4">
        <p class="text-sm text-gray-400">Didn't receive the email?</p>
        <button id="resend-btn" class="px-6 py-2 rounded-lg bg-surface-800 hover:bg-surface-700 text-gray-300 text-sm font-medium border border-surface-700 transition-colors inline-flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
          Resend Code
        </button>
        <p id="cooldown-text" class="text-xs text-brand-400 hidden font-medium mt-2"></p>
      </div>
    </div>
  </main>
  
  <footer id="app-footer" class="mt-auto border-t border-white/5 bg-surface-950/50"></footer>
  <script src="/js/common.js?v=2"></script>
  <script src="/js/verify-email.js?v=2"></script>
</body>
</html>
