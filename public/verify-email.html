<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Verify Email | EntreVid</title>
  <meta name="description" content="Verify your EntreVid email address with your OTP code."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/layout.css"/>
  <link rel="stylesheet" href="/css/components.css"/>
  <style>
    .otp-input {
      width: 48px; height: 56px; text-align: center; font-size: 1.4rem; font-weight: 700;
      background: #0b0d17; border: 1.5px solid #262b3d; border-radius: 12px; color: #e6e8ef;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; font-family: 'Sora', monospace;
    }
    .otp-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .otp-input.filled { border-color: rgba(99,102,241,0.5); }
    @media(max-width: 420px){ .otp-input { width: 38px; height: 46px; font-size: 1.1rem; } }
  </style>
</head>
<body style="background:#0b0d17;color:#e6e8ef;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;">
  <nav id="main-nav" style="position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);background:rgba(11,13,23,0.85);border-bottom:1px solid rgba(255,255,255,0.06);"></nav>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;">
    <div style="position:absolute;top:20%;left:30%;width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.1),transparent 70%);pointer-events:none;border-radius:50%;"></div>

    <div style="width:100%;max-width:440px;background:#141826;border:1px solid #262b3d;border-radius:20px;padding:40px;text-align:center;position:relative;">
      <!-- Icon -->
      <div style="width:64px;height:64px;border-radius:20px;background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;">📧</div>
      <h1 style="font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:8px;">Check your email</h1>
      <p style="font-size:14px;color:#8a91a8;margin-bottom:28px;line-height:1.6;">We've sent a 6-digit verification code to your email. Enter it below to verify your account.</p>

      <!-- Error -->
      <div id="error-box" class="hidden" style="padding:12px 16px;background:rgba(244,63,94,0.1);border:1px solid rgba(244,63,94,0.25);border-radius:10px;color:#fb7185;font-size:14px;margin-bottom:20px;text-align:left;"></div>

      <form id="verify-form">
        <!-- OTP inputs -->
        <div id="otp-inputs" style="display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:28px;">
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input" autocomplete="one-time-code"/>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
          <div style="width:16px;height:2px;background:#262b3d;border-radius:2px;"></div>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
          <input type="text" inputmode="numeric" maxlength="1" class="otp-input"/>
        </div>
        <button type="submit" id="submit-btn" style="width:100%;padding:13px;background:linear-gradient(135deg,#6366f1,#a855f7);border:none;border-radius:10px;color:#fff;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 0 20px rgba(99,102,241,0.3);">Verify Email</button>
      </form>

      <div style="margin-top:24px;padding-top:20px;border-top:1px solid #262b3d;">
        <p style="font-size:13px;color:#8a91a8;margin-bottom:12px;">Didn't receive the email?</p>
        <button id="resend-btn" style="padding:9px 20px;background:#1c2030;border:1px solid #262b3d;border-radius:10px;color:#e6e8ef;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:8px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Resend Code
        </button>
        <p id="cooldown-text" class="hidden" style="font-size:12px;color:#818cf8;margin-top:10px;font-weight:500;"></p>
      </div>
    </div>
  </main>

  <footer id="app-footer" style="border-top:1px solid rgba(255,255,255,0.05);background:rgba(11,13,23,0.6);"></footer>
  <script src="/js/common.js?v=7"></script>
  <script src="/js/verify-email.js?v=2"></script>
</body>
</html>
